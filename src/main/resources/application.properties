# AI Client Application Configuration

# Database
database.path=./data/ai-client.db

# AI Services
ai.text.service.host=localhost
ai.text.service.port=11434
ai.image.service.host=localhost
ai.image.service.port=7860

# Model Directories
models.text.directory=./models/text
models.image.directory=./models/image

# Generated Content Storage
storage.images.directory=./data/generated-images
storage.chat.directory=./data/chat-history

# Process Management
process.ollama.command=ollama serve
process.sd.command=stable-diffusion-webui --api
process.startup.timeout.seconds=30
